name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Pre-compile Mac Tray Swift binary
        run: |
          mkdir -p src/MauiForge/Resources/mac-tray
          swiftc -O src/MauiForge/Resources/mac-tray/main.swift -o src/MauiForge/Resources/mac-tray/mac-tray || true
          chmod +x src/MauiForge/Resources/mac-tray/mac-tray || true

      - name: Build and pack
        run: |
          dotnet pack src/MauiForge/MauiForge.csproj \
            --configuration Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            --output ./nupkg

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
