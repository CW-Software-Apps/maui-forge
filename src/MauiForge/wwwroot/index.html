<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAUI Forge Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SignalR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #020617;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spinning {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="h-full flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md px-6 py-4 flex items-center justify-between flex-shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center font-bold text-lg shadow-lg shadow-cyan-500/20">
                MF
            </div>
            <div>
                <div class="flex items-center gap-2">
                    <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">MAUI Forge</h1>
                    <span class="text-[10px] font-mono font-semibold px-2 py-0.5 rounded-full bg-slate-800 text-slate-400 border border-slate-700">v1.5.25</span>
                </div>
                <p class="text-xs text-slate-400">Version & Build Manager</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <a href="https://github.com/CW-Software-Apps/maui-forge" target="_blank" class="text-xs text-slate-400 hover:text-white transition flex items-center gap-1">
                🐙 GitHub Repository
            </a>
            <button onclick="loadDiagnostics()" class="px-3 py-1.5 rounded-lg border border-slate-800 hover:border-slate-700 bg-slate-900 text-xs font-medium text-slate-300 transition flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                Local Host Connected
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <div class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar: Monitored Folders -->
        <aside class="w-80 border-r border-slate-800 bg-slate-900/20 p-6 flex flex-col gap-6 overflow-y-auto flex-shrink-0">
            <div>
                <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Monitored Folders</h2>
                <div id="pathsList" class="flex flex-col gap-2">
                    <!-- Path items injected here -->
                </div>
            </div>

            <div class="border-t border-slate-800/60 pt-4">
                <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Add Folder</h3>
                <form id="addPathForm" onsubmit="addPath(event)" class="flex flex-col gap-2">
                    <input type="text" id="newPathInput" placeholder="K:\your\projects" required
                           class="w-full bg-slate-900 border border-slate-800 hover:border-slate-700 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 rounded-lg px-3 py-2 text-xs text-slate-100 placeholder-slate-500 outline-none transition">
                    <button type="submit" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-medium text-xs rounded-lg py-2 transition shadow-md shadow-cyan-500/10">
                        Add Directory
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Dashboard View -->
        <main class="flex-1 flex flex-col overflow-hidden bg-slate-950">
            <!-- App list / dashboard -->
            <div class="flex-1 p-6 overflow-y-auto">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-semibold text-white flex items-center gap-2">
                        Applications
                        <span id="appCount" class="text-xs font-normal text-slate-400 bg-slate-900 px-2 py-0.5 rounded-full">0</span>
                    </h2>
                    <div class="flex items-center gap-4">
                        <!-- Layout toggles -->
                        <div class="inline-flex rounded-lg border border-slate-800 p-0.5 bg-slate-900/50">
                            <button id="layoutCardBtn" onclick="setLayout('card')" class="px-3 py-1.5 rounded-md text-xs font-medium transition">🎴 Cards</button>
                            <button id="layoutListBtn" onclick="setLayout('list')" class="px-3 py-1.5 rounded-md text-xs font-medium transition">📋 List</button>
                        </div>
                        <button onclick="loadApps()" class="text-xs bg-slate-900 hover:bg-slate-800 border border-slate-800 px-3 py-1.5 rounded-lg text-slate-300 transition flex items-center gap-1.5">
                            🔄 Refresh All
                        </button>
                    </div>
                </div>

                <!-- Search and Filters bar -->
                <div class="flex flex-col md:flex-row gap-4 mb-6 bg-slate-900/40 p-4 rounded-xl border border-slate-900">
                    <div class="flex-1">
                        <input type="text" id="searchInput" oninput="filterApps()" placeholder="🔍 Search applications by name or path..."
                               class="w-full bg-slate-950 border border-slate-850 hover:border-slate-800 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 rounded-lg px-3 py-2 text-xs text-slate-100 placeholder-slate-500 outline-none transition">
                    </div>
                    <div class="flex items-center gap-4 flex-wrap">
                        <div class="flex items-center gap-1.5">
                            <span class="text-xs text-slate-400 font-medium">Technology:</span>
                            <select id="techFilter" onchange="filterApps()" 
                                    class="bg-slate-950 border border-slate-850 hover:border-slate-800 rounded-lg px-2.5 py-1.5 text-xs text-slate-300 focus:border-cyan-500 outline-none transition">
                                <option value="all">All Technologies</option>
                                <option value="MAUI">.NET MAUI</option>
                                <option value="Blazor">Blazor</option>
                                <option value="Unity">Unity</option>
                                <option value="WPF">WPF</option>
                                <option value="ClassLibrary">Class Library / Other</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="text-xs text-slate-400 font-medium">Git Status:</span>
                            <select id="gitFilter" onchange="filterApps()" 
                                    class="bg-slate-950 border border-slate-850 hover:border-slate-800 rounded-lg px-2.5 py-1.5 text-xs text-slate-300 focus:border-cyan-500 outline-none transition">
                                <option value="all">All Statuses</option>
                                <option value="dirty">Modified (Dirty)</option>
                                <option value="behind">Pull Pending (Behind)</option>
                                <option value="clean">Clean</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Apps render target -->
                <div id="appsContainer">
                    <!-- Dynamic rendering either cards or list -->
                </div>
            </div>

            <!-- Real-time Terminal Logs section -->
            <div class="h-64 border-t border-slate-800 bg-slate-950 flex flex-col overflow-hidden flex-shrink-0">
                <div class="bg-slate-900/60 px-4 py-2 border-b border-slate-800 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="w-2.5 h-2.5 rounded-full bg-cyan-500 animate-pulse"></span>
                        <span class="text-xs font-semibold text-slate-300 tracking-wide uppercase">Build Output Terminal</span>
                    </div>
                    <button onclick="clearConsole()" class="text-slate-400 hover:text-slate-200 text-xs px-2 py-0.5 rounded hover:bg-slate-800 transition">
                        Clear
                    </button>
                </div>
                <div id="terminalConsole" class="flex-1 p-4 overflow-y-auto bg-slate-950 text-slate-300 font-mono text-xs space-y-1 select-text selection:bg-slate-800">
                    <div class="text-slate-500">[Info] System idle. Trigger a build or deploy to stream output here...</div>
                </div>
            </div>

        </main>
    </div>

    <!-- Modals -->
    <!-- Update Version Modal -->
    <div id="versionModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 border border-slate-850 rounded-2xl w-full max-w-md overflow-hidden shadow-2xl">
            <div class="px-6 py-4 border-b border-slate-800 flex items-center justify-between">
                <h3 class="font-bold text-white">Update Version</h3>
                <button onclick="closeVersionModal()" class="text-slate-400 hover:text-white">✕</button>
            </div>
            <div class="p-6 space-y-4">
                <input type="hidden" id="modalAppDir">
                <div>
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">Version String</label>
                    <input type="text" id="modalVersionInput" class="w-full bg-slate-950 border border-slate-850 rounded-lg px-3 py-2 text-sm text-slate-100 placeholder-slate-600 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">Build Number</label>
                    <input type="text" id="modalBuildInput" class="w-full bg-slate-950 border border-slate-850 rounded-lg px-3 py-2 text-sm text-slate-100 placeholder-slate-600 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition">
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="submitVersionUpdate()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-200 hover:text-white font-semibold rounded-lg py-2.5 transition text-sm">
                        💾 Save Local
                    </button>
                    <button onclick="submitVersionUpdateAndPush()" class="flex-1 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-semibold rounded-lg py-2.5 transition text-sm flex items-center justify-center gap-1.5">
                        🚀 Bump & Push
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "";
        let appsList = [];
        let currentLayout = localStorage.getItem("layout") || "card";

        // Establish SignalR connection for build logs
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/hubs/logs")
            .configureLogging(signalR.LogLevel.Information)
            .build();

        connection.on("LogReceived", function (message) {
            const consoleEl = document.getElementById("terminalConsole");
            const wasAtBottom = consoleEl.scrollHeight - consoleEl.clientHeight <= consoleEl.scrollTop + 10;
            
            const line = document.createElement("div");
            line.textContent = message;
            
            // Basic colored logs parsing
            if (message.includes("error") || message.includes("Failed")) {
                line.className = "text-rose-500";
            } else if (message.includes("warning") || message.includes("Warning")) {
                line.className = "text-amber-400";
            } else if (message.startsWith("===") || message.includes("completed")) {
                line.className = "text-cyan-400 font-bold";
            }
            
            consoleEl.appendChild(line);

            if (wasAtBottom) {
                consoleEl.scrollTop = consoleEl.scrollHeight;
            }
        });

        connection.start().catch(err => console.error("SignalR Connection Error: ", err));

        // Load paths and apps on load
        window.addEventListener("DOMContentLoaded", () => {
            loadPaths();
            loadApps();
            updateLayoutButtons();
        });

        function setLayout(layout) {
            currentLayout = layout;
            localStorage.setItem("layout", layout);
            updateLayoutButtons();
            renderApps();
        }

        // Layout button visual indicators
        function updateLayoutButtons() {
            const cardBtn = document.getElementById("layoutCardBtn");
            const listBtn = document.getElementById("layoutListBtn");
            
            if (currentLayout === "card") {
                cardBtn.className = "px-3 py-1.5 rounded-md text-xs font-semibold bg-cyan-600/20 text-cyan-400 border border-cyan-500/20 transition";
                listBtn.className = "px-3 py-1.5 rounded-md text-xs font-medium text-slate-400 hover:text-slate-200 transition";
            } else {
                listBtn.className = "px-3 py-1.5 rounded-md text-xs font-semibold bg-cyan-600/20 text-cyan-400 border border-cyan-500/20 transition";
                cardBtn.className = "px-3 py-1.5 rounded-md text-xs font-medium text-slate-400 hover:text-slate-200 transition";
            }
        }

        function clearConsole() {
            document.getElementById("terminalConsole").innerHTML = '<div class="text-slate-500">[Info] Terminal cleared.</div>';
        }

        async function loadPaths() {
            try {
                const res = await fetch(`${API_BASE}/api/paths`);
                const paths = await res.json();
                const container = document.getElementById("pathsList");
                container.innerHTML = "";

                if (paths.length === 0) {
                    container.innerHTML = `<div class="text-xs text-slate-500 italic p-2 border border-dashed border-slate-800 rounded-lg">No directories registered yet. Add one below to start discovery.</div>`;
                    return;
                }

                paths.forEach(p => {
                    const item = document.createElement("div");
                    item.className = "flex items-center justify-between p-2 rounded-lg bg-slate-900/50 border border-slate-850 hover:border-slate-800 transition group";
                    item.innerHTML = `
                        <span class="text-xs font-mono truncate text-slate-300 select-all" title="${p}">${p}</span>
                        <button onclick="removePath('${p.replace(/\\/g, '\\\\')}')" class="text-slate-500 hover:text-rose-500 text-xs px-1.5 py-0.5 rounded opacity-0 group-hover:opacity-100 transition">✕</button>
                    `;
                    container.appendChild(item);
                });
            } catch (err) {
                console.error("Failed to load paths:", err);
            }
        }

        async function addPath(e) {
            e.preventDefault();
            const input = document.getElementById("newPathInput");
            const path = input.value.trim();
            if (!path) return;

            try {
                const res = await fetch(`${API_BASE}/api/paths`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ path })
                });
                if (res.ok) {
                    input.value = "";
                    loadPaths();
                    loadApps();
                } else {
                    alert(await res.text());
                }
            } catch (err) {
                console.error("Failed to add path:", err);
            }
        }

        async function removePath(path) {
            if (!confirm(`Are you sure you want to stop monitoring:\n${path}`)) return;
            try {
                await fetch(`${API_BASE}/api/paths/delete`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ path })
                });
                loadPaths();
                loadApps();
            } catch (err) {
                console.error("Failed to remove path:", err);
            }
        }

        async function loadApps() {
            const container = document.getElementById("appsContainer");
            container.innerHTML = '<div class="text-center py-12 text-slate-500 text-sm">🔄 Scanning folders for projects...</div>';
            
            try {
                const res = await fetch(`${API_BASE}/api/apps`);
                appsList = await res.json();
                renderApps();
            } catch (err) {
                console.error("Failed to load apps:", err);
                container.innerHTML = '<div class="text-center py-12 text-rose-500 text-sm">Failed to connect to Localhost Web Server. Verify service status.</div>';
            }
        }

        async function refreshSingleApp(dir, iconId) {
            const icon = document.getElementById(iconId);
            if (icon) icon.classList.add("spinning");

            try {
                const res = await fetch(`${API_BASE}/api/apps/refresh`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ dir })
                });
                if (res.ok) {
                    const updatedApp = await res.json();
                    const index = appsList.findIndex(a => a.dir === dir);
                    if (index !== -1) {
                        appsList[index] = updatedApp;
                    } else {
                        appsList.push(updatedApp);
                    }
                    renderApps();
                }
            } catch (err) {
                console.error("Failed to refresh app:", err);
            } finally {
                if (icon) icon.classList.remove("spinning");
            }
        }

        async function openFolder(dir) {
            try {
                await fetch(`${API_BASE}/api/apps/open-folder`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ dir })
                });
            } catch (err) {
                console.error(err);
            }
        }

        async function openIDE(dir, ide) {
            try {
                const res = await fetch(`${API_BASE}/api/apps/open-ide`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ dir, ide })
                });
                if (!res.ok) {
                    alert(await res.text());
                }
            } catch (err) {
                console.error(err);
            }
        }

        function filterApps() {
            renderApps();
        }

        function renderApps() {
            const container = document.getElementById("appsContainer");
            container.innerHTML = "";

            const searchQuery = document.getElementById("searchInput").value.trim().toLowerCase();
            const techFilter = document.getElementById("techFilter").value;
            const gitFilter = document.getElementById("gitFilter").value;

            // Filter logic
            const filteredApps = appsList.filter(app => {
                const matchesSearch = app.name.toLowerCase().includes(searchQuery) || app.dir.toLowerCase().includes(searchQuery);
                const matchesTech = techFilter === "all" || app.projectType === techFilter;
                
                let matchesGit = true;
                if (gitFilter === "dirty") {
                    matchesGit = app.git.dirty;
                } else if (gitFilter === "behind") {
                    matchesGit = app.git.behind > 0;
                } else if (gitFilter === "clean") {
                    matchesGit = !app.git.dirty && app.git.behind === 0;
                }

                return matchesSearch && matchesTech && matchesGit;
            });

            document.getElementById("appCount").textContent = filteredApps.length;

            if (filteredApps.length === 0) {
                container.innerHTML = '<div class="text-center py-12 text-slate-500 text-sm">No matching applications found.</div>';
                return;
            }

            const getTechBadge = (type) => {
                if (type === "MAUI") return `<span class="px-2 py-0.5 rounded text-[10px] font-bold bg-violet-650/10 text-violet-400 border border-violet-500/20">🟣 MAUI</span>`;
                if (type === "Blazor") return `<span class="px-2 py-0.5 rounded text-[10px] font-bold bg-amber-655/10 text-amber-400 border border-amber-500/20">🟠 Blazor</span>`;
                if (type === "Unity") return `<span class="px-2 py-0.5 rounded text-[10px] font-bold bg-slate-750/20 text-slate-300 border border-slate-600/20">🎮 Unity</span>`;
                if (type === "WPF") return `<span class="px-2 py-0.5 rounded text-[10px] font-bold bg-blue-655/10 text-blue-400 border border-blue-500/20">🖥️ WPF</span>`;
                return `<span class="px-2 py-0.5 rounded text-[10px] font-bold bg-slate-800 text-slate-400 border border-slate-700">📁 ClassLib</span>`;
            };

            const getCardBorderClass = (type) => {
                if (type === "MAUI") return "border-violet-500/20 hover:border-violet-500/50 shadow-violet-500/5";
                if (type === "Blazor") return "border-amber-500/20 hover:border-amber-500/50 shadow-amber-500/5";
                if (type === "Unity") return "border-slate-700/30 hover:border-slate-650/55 shadow-slate-600/5";
                if (type === "WPF") return "border-blue-500/20 hover:border-blue-500/50 shadow-blue-500/5";
                return "border-slate-850 hover:border-slate-700";
            };

            if (currentLayout === "card") {
                const grid = document.createElement("div");
                grid.className = "grid grid-cols-1 xl:grid-cols-2 gap-6";
                
                filteredApps.forEach((app, idx) => {
                    const card = document.createElement("div");
                    card.className = `bg-slate-900/35 border rounded-xl p-5 flex flex-col gap-4 transition shadow-sm hover:shadow-md relative overflow-hidden ${getCardBorderClass(app.projectType)}`;
                    
                    const isDirty = app.git.dirty;
                    const gitStatusText = isDirty ? "Dirty" : "Clean";
                    const gitBadgeColor = isDirty ? "bg-amber-500/10 text-amber-400 border-amber-500/20" : "bg-emerald-500/10 text-emerald-400 border-emerald-500/20";
                    
                    const iosVer = app.versions.iOS ? `${app.versions.iOS.version} (${app.versions.iOS.build})` : "N/A";
                    const androidVer = app.versions.android ? `${app.versions.android.version} (${app.versions.android.build})` : "N/A";
                    const csprojVer = app.versions.csproj ? `${app.versions.csproj.version} (${app.versions.csproj.build})` : "N/A";

                    const isBehind = app.git.behind > 0;
                    const pullWarningHtml = isBehind 
                        ? `<div class="bg-amber-500/10 border border-amber-500/20 text-amber-400 rounded-lg p-2.5 text-xs flex items-center justify-between gap-2">
                             <span>⚠️ <b>Pull Pending:</b> This repository is ${app.git.behind} commits behind remote.</span>
                             <button onclick="pullGit('${app.dir.replace(/\\/g, '\\\\')}')" class="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold px-2 py-1 rounded transition text-[10px]">PULL NOW</button>
                           </div>` 
                        : "";

                    // Action buttons depending on Type
                    let actionButtons = `
                        <button onclick="openVersionUpdate('${app.dir.replace(/\\/g, '\\\\')}', '${app.versions.csproj?.version || ''}', '${app.versions.csproj?.build || ''}')" 
                                class="bg-slate-900 border border-slate-800 hover:border-slate-700 text-slate-300 font-semibold text-xs px-3 py-1.5 rounded-lg transition" title="Change version details">
                            ✏️ Edit Version
                        </button>
                        <button onclick="pullGit('${app.dir.replace(/\\/g, '\\\\')}')" 
                                class="bg-slate-900 border border-slate-800 hover:border-slate-700 text-slate-300 font-semibold text-xs px-3 py-1.5 rounded-lg transition" title="Fetch and pull git updates">
                            ⬇️ Pull
                        </button>
                        <button onclick="openFolder('${app.dir.replace(/\\/g, '\\\\')}')" 
                                class="bg-slate-900 border border-slate-800 hover:border-slate-700 text-slate-350 hover:text-white font-semibold text-xs px-3 py-1.5 rounded-lg transition" title="Open directory in Windows Explorer">
                            📂 Open Folder
                        </button>
                        
                        <!-- Open in IDE Dropdown Options -->
                        <div class="relative inline-block text-left group">
                            <button class="bg-slate-900 border border-slate-800 hover:border-slate-700 text-slate-350 hover:text-white font-semibold text-xs px-3 py-1.5 rounded-lg transition">
                                💻 IDE ▾
                            </button>
                            <div class="absolute bottom-full mb-1 left-0 w-32 bg-slate-900 border border-slate-800 rounded-lg shadow-xl hidden group-hover:block z-20">
                                <button onclick="openIDE('${app.dir.replace(/\\/g, '\\\\')}', 'vs')" class="w-full text-left px-3 py-2 text-xs hover:bg-slate-800 text-slate-300 hover:text-white rounded-t-lg transition">🎥 Visual Studio</button>
                                <button onclick="openIDE('${app.dir.replace(/\\/g, '\\\\')}', 'vscode')" class="w-full text-left px-3 py-2 text-xs hover:bg-slate-800 text-slate-300 hover:text-white transition">💙 VS Code</button>
                                <button onclick="openIDE('${app.dir.replace(/\\/g, '\\\\')}', 'rider')" class="w-full text-left px-3 py-2 text-xs hover:bg-slate-800 text-slate-300 hover:text-white rounded-b-lg transition">❤️ Rider</button>
                            </div>
                        </div>
                    `;

                    if (app.projectType === "MAUI") {
                        actionButtons += `
                            <button onclick="buildApp('${app.dir.replace(/\\/g, '\\\\')}', 'Android')" 
                                    class="bg-cyan-600/10 border border-cyan-500/20 hover:border-cyan-500/50 text-cyan-400 font-semibold text-xs px-3 py-1.5 rounded-lg transition ml-auto">
                                🤖 Build Android
                            </button>
                            <button onclick="buildApp('${app.dir.replace(/\\/g, '\\\\')}', 'iOS')" 
                                    class="bg-blue-600/10 border border-blue-500/20 hover:border-blue-500/50 text-blue-400 font-semibold text-xs px-3 py-1.5 rounded-lg transition">
                                🍎 Build iOS
                            </button>
                        `;
                    } else if (app.projectType === "WPF") {
                        actionButtons += `
                            <button onclick="buildApp('${app.dir.replace(/\\/g, '\\\\')}', 'Windows')" 
                                    class="bg-blue-600/10 border border-blue-500/20 hover:border-blue-500/50 text-blue-400 font-semibold text-xs px-3 py-1.5 rounded-lg transition ml-auto">
                                🖥️ Build Windows
                            </button>
                        `;
                    } else if (app.projectType === "Blazor") {
                        actionButtons += `
                            <button onclick="buildApp('${app.dir.replace(/\\/g, '\\\\')}', 'Web')" 
                                    class="bg-amber-600/10 border border-amber-500/20 hover:border-amber-500/50 text-amber-450 font-semibold text-xs px-3 py-1.5 rounded-lg transition ml-auto">
                                🌐 Build Web
                            </button>
                        `;
                    }

                    const appIconHtml = app.iconBase64 
                        ? `<img src="${app.iconBase64}" class="w-10 h-10 rounded-lg object-contain bg-slate-950/40 border border-slate-800 shadow" alt="${app.name} Icon">`
                        : `<div class="w-10 h-10 rounded-lg bg-slate-900 border border-slate-800 flex items-center justify-center text-xs font-bold text-slate-500 shadow select-none">MF</div>`;

                    card.innerHTML = `
                        <div class="flex items-start justify-between">
                            <div class="flex items-center gap-3">
                                ${appIconHtml}
                                <div>
                                    <div class="flex items-center gap-2 flex-wrap">
                                        <h3 class="font-bold text-white text-base">${app.name}</h3>
                                        ${getTechBadge(app.projectType)}
                                        <button onclick="refreshSingleApp('${app.dir.replace(/\\/g, '\\\\')}', 'icon-card-${idx}')" 
                                                class="text-slate-500 hover:text-slate-300 text-xs transition" title="Refresh this project">
                                            <span id="icon-card-${idx}" class="inline-block">🔄</span>
                                        </button>
                                    </div>
                                    <p class="text-xs font-mono text-slate-550 truncate max-w-xs md:max-w-md" title="${app.dir}">${app.dir}</p>
                                </div>
                            </div>
                            <span class="text-xs px-2 py-0.5 rounded-full border ${gitBadgeColor} font-medium">
                                ${app.branch} [${gitStatusText}]
                            </span>
                        </div>

                        ${pullWarningHtml}

                        <!-- Versions Grid -->
                        <div class="grid grid-cols-3 gap-3 bg-slate-950/40 p-3 rounded-lg border border-slate-850/40">
                            <div>
                                <div class="text-[10px] text-slate-500 uppercase tracking-wider">Csproj / Asset</div>
                                <div class="text-xs font-mono font-medium text-slate-300 mt-1">${csprojVer}</div>
                            </div>
                            <div>
                                <div class="text-[10px] text-slate-500 uppercase tracking-wider">Android</div>
                                <div class="text-xs font-mono font-medium text-slate-300 mt-1">${androidVer}</div>
                            </div>
                            <div>
                                <div class="text-[10px] text-slate-500 uppercase tracking-wider">iOS</div>
                                <div class="text-xs font-mono font-medium text-slate-300 mt-1">${iosVer}</div>
                            </div>
                        </div>

                        <!-- Actions bar -->
                        <div class="flex items-center gap-2 pt-2">
                            ${actionButtons}
                        </div>
                    `;
                    grid.appendChild(card);
                });
                container.appendChild(grid);
            } else {
                // Table View
                const tableWrapper = document.createElement("div");
                tableWrapper.className = "overflow-x-auto border border-slate-800 rounded-xl bg-slate-900/10";
                
                let tableHtml = `
                    <table class="min-w-full divide-y divide-slate-800 text-left text-xs">
                        <thead class="bg-slate-900/50 text-slate-400 uppercase tracking-wider font-semibold">
                            <tr>
                                <th class="px-4 py-3">App Name</th>
                                <th class="px-4 py-3">Versions (Proj / Android / iOS)</th>
                                <th class="px-4 py-3">Git Branch & Status</th>
                                <th class="px-4 py-3 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800 bg-slate-950/20">
                `;

                filteredApps.forEach((app, idx) => {
                    const isDirty = app.git.dirty;
                    const gitStatusText = isDirty ? "Dirty" : "Clean";
                    const gitBadgeColor = isDirty ? "text-amber-400" : "text-emerald-400";
                    
                    const iosVer = app.versions.iOS ? `${app.versions.iOS.version} (${app.versions.iOS.build})` : "N/A";
                    const androidVer = app.versions.android ? `${app.versions.android.version} (${app.versions.android.build})` : "N/A";
                    const csprojVer = app.versions.csproj ? `${app.versions.csproj.version} (${app.versions.csproj.build})` : "N/A";

                    const isBehind = app.git.behind > 0;
                    const gitPullAlert = isBehind 
                        ? `<span class="bg-amber-500/10 text-amber-550 border border-amber-500/25 px-2 py-0.5 rounded text-[10px] ml-2 animate-pulse" title="Click Pull below to update">⚠️ Pull Pending</span>` 
                        : "";

                    // Action buttons depending on Type
                    let actionButtons = `
                        <button onclick="openVersionUpdate('${app.dir.replace(/\\/g, '\\\\')}', '${app.versions.csproj?.version || ''}', '${app.versions.csproj?.build || ''}')" 
                                class="bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300 font-semibold px-2 py-1 rounded transition text-[11px]">
                            ✏️ Version
                        </button>
                        <button onclick="pullGit('${app.dir.replace(/\\/g, '\\\\')}')" 
                                class="bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300 font-semibold px-2 py-1 rounded transition text-[11px]">
                            ⬇️ Pull
                        </button>
                        <button onclick="openFolder('${app.dir.replace(/\\/g, '\\\\')}')" 
                                class="bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300 font-semibold px-2 py-1 rounded transition text-[11px]">
                            📂 Folder
                        </button>
                        
                        <!-- IDE open menu -->
                        <div class="relative inline-block text-left group">
                            <button class="bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-350 hover:text-white font-semibold px-2 py-1 rounded transition text-[11px]">
                                💻 IDE
                            </button>
                            <div class="absolute bottom-full mb-1 left-0 w-32 bg-slate-900 border border-slate-800 rounded-lg shadow-xl hidden group-hover:block z-20">
                                <button onclick="openIDE('${app.dir.replace(/\\/g, '\\\\')}', 'vs')" class="w-full text-left px-3 py-2 text-xs hover:bg-slate-800 text-slate-300 hover:text-white rounded-t-lg transition">Visual Studio</button>
                                <button onclick="openIDE('${app.dir.replace(/\\/g, '\\\\')}', 'vscode')" class="w-full text-left px-3 py-2 text-xs hover:bg-slate-800 text-slate-300 hover:text-white transition">VS Code</button>
                                <button onclick="openIDE('${app.dir.replace(/\\/g, '\\\\')}', 'rider')" class="w-full text-left px-3 py-2 text-xs hover:bg-slate-800 text-slate-300 hover:text-white rounded-b-lg transition">Rider</button>
                            </div>
                        </div>
                    `;

                    if (app.projectType === "MAUI") {
                        actionButtons += `
                            <button onclick="buildApp('${app.dir.replace(/\\/g, '\\\\')}', 'Android')" 
                                    class="bg-cyan-600/10 border border-cyan-500/20 hover:border-cyan-500/50 text-cyan-400 font-semibold px-2 py-1 rounded transition text-[11px]">
                                🤖 Build Android
                            </button>
                            <button onclick="buildApp('${app.dir.replace(/\\/g, '\\\\')}', 'iOS')" 
                                    class="bg-blue-600/10 border border-blue-500/20 hover:border-blue-500/50 text-blue-400 font-semibold px-2 py-1 rounded transition text-[11px]">
                                🍎 Build iOS
                            </button>
                        `;
                    } else if (app.projectType === "WPF") {
                        actionButtons += `
                            <button onclick="buildApp('${app.dir.replace(/\\/g, '\\\\')}', 'Windows')" 
                                    class="bg-blue-600/10 border border-blue-500/20 hover:border-blue-500/50 text-blue-400 font-semibold px-2 py-1 rounded transition text-[11px]">
                                🖥️ Build Windows
                            </button>
                        `;
                    } else if (app.projectType === "Blazor") {
                        actionButtons += `
                            <button onclick="buildApp('${app.dir.replace(/\\/g, '\\\\')}', 'Web')" 
                                    class="bg-amber-600/10 border border-amber-505/20 hover:border-amber-505/50 text-amber-450 font-semibold px-2 py-1 rounded transition text-[11px]">
                                🌐 Build Web
                            </button>
                        `;
                    }

                    const appIconHtml = app.iconBase64 
                        ? `<img src="${app.iconBase64}" class="w-6 h-6 rounded object-contain bg-slate-950/30 border border-slate-850 shadow" alt="${app.name} Icon">`
                        : `<div class="w-6 h-6 rounded bg-slate-900 border border-slate-850 flex items-center justify-center text-[10px] font-bold text-slate-500 select-none">MF</div>`;

                    tableHtml += `
                        <tr class="hover:bg-slate-900/20 transition">
                            <td class="px-4 py-3.5">
                                <div class="flex items-center gap-3">
                                    ${appIconHtml}
                                    <div>
                                        <div class="flex items-center gap-2 flex-wrap">
                                            <span class="font-bold text-white">${app.name}</span>
                                            ${getTechBadge(app.projectType)}
                                            <button onclick="refreshSingleApp('${app.dir.replace(/\\/g, '\\\\')}', 'icon-list-${idx}')" 
                                                    class="text-slate-500 hover:text-slate-300 transition">
                                                <span id="icon-list-${idx}" class="inline-block">🔄</span>
                                            </button>
                                        </div>
                                        <span class="text-[10px] font-mono text-slate-500 truncate block max-w-xs" title="${app.dir}">${app.dir}</span>
                                    </div>
                                </div>
                            </td>
                            <td class="px-4 py-3.5 font-mono text-slate-300">
                                <div><span class="text-[10px] text-slate-500 uppercase mr-1">Proj/Asset:</span> ${csprojVer}</div>
                                <div><span class="text-[10px] text-slate-500 uppercase mr-1">Android:</span> ${androidVer}</div>
                                <div><span class="text-[10px] text-slate-500 uppercase mr-1">iOS:</span>  ${iosVer}</div>
                            </td>
                            <td class="px-4 py-3.5 font-medium">
                                <div class="flex items-center">
                                    <span class="text-slate-200 font-mono">${app.branch}</span>
                                    <span class="mx-2 text-slate-600">|</span>
                                    <span class="${gitBadgeColor}">${gitStatusText}</span>
                                    ${gitPullAlert}
                                </div>
                            </td>
                            <td class="px-4 py-3.5 text-right space-x-1.5">
                                ${actionButtons}
                            </td>
                        </tr>
                    `;
                });

                tableHtml += `
                        </tbody>
                    </table>
                `;
                tableWrapper.innerHTML = tableHtml;
                container.appendChild(tableWrapper);
            }
        }

        function openVersionUpdate(dir, ver, build) {
            document.getElementById("modalAppDir").value = dir;
            document.getElementById("modalVersionInput").value = ver;
            document.getElementById("modalBuildInput").value = build;
            document.getElementById("versionModal").classList.remove("hidden");
        }

        function closeVersionModal() {
            document.getElementById("versionModal").classList.add("hidden");
        }

        async function submitVersionUpdate() {
            const dir = document.getElementById("modalAppDir").value;
            const version = document.getElementById("modalVersionInput").value;
            const build = document.getElementById("modalBuildInput").value;

            try {
                const res = await fetch(`${API_BASE}/api/apps/version`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ dir, version, build })
                });
                if (res.ok) {
                    closeVersionModal();
                    loadApps();
                } else {
                    alert(await res.text());
                }
            } catch (err) {
                console.error("Failed to update version:", err);
            }
        }

        async function submitVersionUpdateAndPush() {
            const dir = document.getElementById("modalAppDir").value;
            const version = document.getElementById("modalVersionInput").value;
            const build = document.getElementById("modalBuildInput").value;

            const terminal = document.getElementById("terminalConsole");
            terminal.innerHTML = '<div class="text-slate-400">[Bump & Push] Writing version and pushing commits...</div>';
            closeVersionModal();

            try {
                const res = await fetch(`${API_BASE}/api/apps/bump-push`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ dir, version, build })
                });
                const data = await res.json();
                
                const line = document.createElement("div");
                line.className = data.success ? "text-emerald-400 font-bold" : "text-rose-500";
                line.textContent = data.success 
                    ? `[Bump & Push] Successfully updated to ${data.version} #${data.build} and pushed to origin.` 
                    : `[Bump & Push] Version written, but push failed: ${data.output}`;
                
                terminal.appendChild(line);
                loadApps();
            } catch (err) {
                console.error("Failed to bump & push version:", err);
            }
        }

        async function pullGit(dir) {
            const terminal = document.getElementById("terminalConsole");
            terminal.innerHTML = '<div class="text-slate-400">[Git] Running git pull...</div>';
            try {
                const res = await fetch(`${API_BASE}/api/apps/git/pull`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ dir })
                });
                const data = await res.json();
                const line = document.createElement("div");
                line.className = data.success ? "text-emerald-400" : "text-rose-500";
                line.textContent = data.output || "Git pull executed.";
                terminal.appendChild(line);
                loadApps();
            } catch (err) {
                console.error(err);
            }
        }

        async function buildApp(dir, platform) {
            clearConsole();
            try {
                await fetch(`${API_BASE}/api/apps/build`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ dir, platform, configuration: "Debug" })
                });
            } catch (err) {
                console.error(err);
            }
        }

        async function loadDiagnostics() {
            try {
                const res = await fetch(`${API_BASE}/api/diagnostics`);
                const diag = await res.json();
                alert(`OS: ${diag.os}\n.NET version: ${diag.dotnetVersion}`);
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
